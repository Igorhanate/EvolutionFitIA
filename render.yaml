services:
  - type: web
    name: evolutionfit-api
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: evolutionfit-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: PAYMENT_LINK_TRIMESTRAL
        sync: false
      - key: PAYMENT_LINK_ANUAL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://evolutionfit-api.onrender.com

databases:
  - name: evolutionfit-db
    databaseName: evolutionfit
    plan: free
