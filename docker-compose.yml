services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Servidor
      SERVER_TYPE: http
      SERVER_PORT: "8080"

      # CORS
      CORS_ORIGIN: "*"
      CORS_METHODS: "POST,GET,PUT,DELETE"
      CORS_CREDENTIALS: "true"

      # Logs
      LOG_LEVEL: "ERROR,WARN,INFO,LOG"
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"

      # Banco de dados (reusa o PostgreSQL local do projeto)
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@host.docker.internal:5432/evolutionfit
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # Integrações extras desligadas
      RABBITMQ_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"

      # WhatsApp
      WHATSAPP_OVERRIDE_SETTINGS: "true"
      WHATSAPP_REJECT_CALL: "false"
      WHATSAPP_ALWAYS_ONLINE: "false"
      WHATSAPP_READING_MESSAGE: "true"
      CONFIG_SESSION_PHONE_CLIENT: "EvolutionFitIA"
      CONFIG_SESSION_PHONE_NAME: "chrome"

      # QR Code
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#198754"

      # Autenticação
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: "evfit_secret_key_2026"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      LANGUAGE: "pt-BR"

    volumes:
      - evolution_instances:/evolution/instances

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  evolution_instances:
